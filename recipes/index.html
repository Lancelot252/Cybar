<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/styles/theme-tokens.css">
    <link rel="stylesheet" href="/styles/theme-neon.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <title>鸡尾酒配方 - Cybar</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1><a href="/">Cybar</a></h1>
        <div id="user-status">
            <!-- Status will be loaded here by global.js -->
            <a href="/auth/login/">登录</a> | <a href="/auth/register/">注册</a>
        </div>
    </header>

    <main>
        <section id="recipes-list" class="ui-section">
            <h2>经典配方</h2>
            <div id="search-bar" class="recipe-search-bar">
                <div class="search-row">
                    <input type="text" id="search-input" placeholder="请输入关键字（如配方名称或原料）">
                    <button id="search-button" class="btn--primary" type="button">搜索</button>
                </div>
                <div class="search-row sort-row">
                    <label for="sort-select">排序方式：</label>
                    <select id="sort-select">
                        <option value="default">默认排序（按创建时间）</option>
                        <option value="likes">按点赞数排序</option>
                        <option value="favorites">按收藏数排序</option>
                        <option value="name">按名称排序</option>
                    </select>
                </div>
                <!-- 原料筛选功能已移除 -->
            </div>
            <div id="recipes-container" class="masonry-feed" aria-live="polite"></div>
            <div id="loading-message" class="recipe-loading-message">正在加载配方...</div>
            <div id="pagination-controls" class="feed-status-area" aria-live="polite"></div>
            <div id="feed-sentinel" aria-hidden="true"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Cybar<br>made by 252</p>
    </footer>

    <!-- 引用 JS 文件 -->
    <script src="/js/global.js"></script> <!-- Add global script -->
    <script src="recipes.js"></script>   <!-- Keep recipe script -->
</body>
</html>
