<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/styles/theme-tokens.css">
    <link rel="stylesheet" href="/styles/theme-neon.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <title>配方详情 - Cybar</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/recipes/detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="recipe-detail-page">
    <header>
        <h1><a href="/">Cybar</a></h1>
        <div id="user-status">
            <a href="/auth/login/">登录</a> | <a href="/auth/register/">注册</a>
        </div>
    </header>

    <main>
        <a href="./" class="back-link">返回配方列表</a>

        <section id="recipe-detail" class="recipe-detail-card ui-section">
            <div id="loading-detail-message" class="state-loading">正在加载配方详情...</div>
        </section>

        <section id="ai-taste-analysis" class="ai-analysis-shell ui-section" hidden>
            <div class="ai-analysis-header">
                <div class="ai-analysis-header-pattern" aria-hidden="true"></div>
                <div class="ai-analysis-header-content">
                    <h3>
                        <span class="ai-header-icon"><i class="fas fa-brain"></i></span>
                        AI口味分析
                        <button id="ai-analysis-trigger" class="ai-analysis-badge" type="button">智能分析</button>
                    </h3>
                    <p>基于AI模型的专业口味结构解析</p>
                </div>
            </div>

            <div class="ai-analysis-body">
                <div id="ai-analysis-idle" class="ai-analysis-idle">
                    <div class="icon"><i class="fas fa-wand-magic-sparkles"></i></div>
                    <div class="title">点击“智能分析”开始生成风味报告</div>
                    <div class="subtitle">分析将基于当前配方的配料结构与制作方式</div>
                </div>

                <div id="ai-analysis-loading" class="ai-analysis-loading" hidden>
                    <div class="ai-loader-icon">
                        <div class="ai-spinner"></div>
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="ai-loading-text">
                        <div class="title">正在分析这款鸡尾酒的口味特征...</div>
                        <div class="subtitle">AI正在处理配料结构与风味层次</div>
                    </div>
                </div>

                <div id="ai-analysis-results" class="ai-analysis-results" hidden>
                    <div class="taste-dimensions">
                        <h4><i class="fas fa-chart-radar"></i> 口味维度分析</h4>
                        <div class="taste-radar-container">
                            <div class="radar-chart">
                                <canvas id="taste-radar" width="220" height="220"></canvas>
                            </div>

                            <div class="taste-bars">
                                <div class="taste-bar" data-taste="sweetness">
                                    <div class="taste-bar-head">
                                        <span>🍯 甜度</span>
                                        <span id="sweetness-value">0/5</span>
                                    </div>
                                    <div class="taste-bar-track"><div id="sweetness-fill" class="taste-bar-fill"></div></div>
                                </div>

                                <div class="taste-bar" data-taste="sourness">
                                    <div class="taste-bar-head">
                                        <span>🍋 酸度</span>
                                        <span id="sourness-value">0/5</span>
                                    </div>
                                    <div class="taste-bar-track"><div id="sourness-fill" class="taste-bar-fill"></div></div>
                                </div>

                                <div class="taste-bar" data-taste="bitterness">
                                    <div class="taste-bar-head">
                                        <span>🌿 苦度</span>
                                        <span id="bitterness-value">0/5</span>
                                    </div>
                                    <div class="taste-bar-track"><div id="bitterness-fill" class="taste-bar-fill"></div></div>
                                </div>

                                <div class="taste-bar" data-taste="strength">
                                    <div class="taste-bar-head">
                                        <span>🔥 烈度</span>
                                        <span id="strength-value">0/5</span>
                                    </div>
                                    <div class="taste-bar-track"><div id="strength-fill" class="taste-bar-fill"></div></div>
                                </div>

                                <div class="taste-bar" data-taste="freshness">
                                    <div class="taste-bar-head">
                                        <span>❄️ 清爽度</span>
                                        <span id="freshness-value">0/5</span>
                                    </div>
                                    <div class="taste-bar-track"><div id="freshness-fill" class="taste-bar-fill"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="ai-text-analysis">
                        <h4><i class="fas fa-file-alt"></i> 专业分析报告</h4>
                        <div id="ai-analysis-content" class="ai-analysis-content"></div>
                    </div>
                </div>

                <div id="ai-analysis-error" class="ai-analysis-error" hidden>
                    <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="title">AI分析暂时不可用</div>
                    <div class="subtitle">请稍后重试或联系管理员</div>
                </div>

                <div id="ai-analysis-meta" class="ai-analysis-meta" hidden></div>
            </div>
        </section>

        <p id="error-message" class="message message-error" hidden></p>

        <section id="comments-section" class="comments-card ui-section">
            <h3>评论</h3>
            <div id="comments-list">
                <p>正在加载评论...</p>
            </div>

            <form id="comment-form" class="comment-form">
                <h4>添加评论</h4>
                <div class="form-group">
                    <textarea id="comment-text" name="commentText" rows="4" required placeholder="输入您的评论..."></textarea>
                </div>
                <p id="comment-error" class="message message-error" hidden></p>
                <button type="submit" class="btn--primary">提交评论</button>
            </form>

            <p id="login-prompt" hidden>请 <a href="/auth/login/">登录</a> 后发表评论。</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Cybar<br>made by 252</p>
    </footer>

    <script src="/js/global.js"></script>
    <script src="detail.js"></script>
</body>
</html>
