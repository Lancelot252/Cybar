<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/styles/theme-tokens.css">
    <link rel="stylesheet" href="/styles/theme-neon.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <title>后台管理 - Cybar</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-page">
    <header>
        <h1><a href="/">Cybar</a></h1>
        <div id="user-status">
            <a href="/auth/login/">登录</a> | <a href="/auth/register/">注册</a>
        </div>
    </header>

    <main>
        <section id="admin-dashboard" class="ui-section">
            <h2>
                仪表盘
                <button id="refresh-admin-data-btn" class="refresh-btn btn--ghost" title="刷新数据">🔄</button>
            </h2>

            <div class="admin-section" id="stats-section">
                <h3>统计数据</h3>
                <div id="admin-stats">加载中...</div>
                <ul>
                    <li>总配方数: <span id="stat-total-recipes">N/A</span></li>
                    <li>总用户数: <span id="stat-total-users">N/A</span></li>
                </ul>
                <div class="chart-container">
                    <canvas id="pageVisitsChart"></canvas>
                </div>
            </div>

            <div class="admin-section" id="recipes-management-section">
                <h3>配方管理</h3>
                <p id="admin-message" class="message"></p>
                <div class="batch-toolbar">
                    <label class="toolbar-check">
                        <input type="checkbox" id="recipe-select-all-page">
                        全选当前页
                    </label>
                    <span id="recipe-selected-count" class="selected-count">已选 0 项</span>
                    <button id="recipe-clear-selection-btn" class="toolbar-btn clear btn--ghost" disabled>清空选择</button>
                    <button id="recipe-batch-delete-btn" class="toolbar-btn danger btn--danger" disabled>批量删除配方</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="select-col">选中</th>
                                <th>ID</th>
                                <th>图片</th>
                                <th>名称</th>
                                <th>创建者</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="admin-recipe-list">
                            <tr><td colspan="6">正在加载配方...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="admin-recipe-pagination" class="pagination-controls"></div>
            </div>

            <div class="admin-section" id="users-management-section">
                <h3>用户管理</h3>
                <p id="admin-user-message" class="message"></p>
                <div class="batch-toolbar">
                    <label class="toolbar-check">
                        <input type="checkbox" id="user-select-all-page">
                        全选当前页
                    </label>
                    <span id="user-selected-count" class="selected-count">已选 0 项</span>
                    <button id="user-clear-selection-btn" class="toolbar-btn clear btn--ghost" disabled>清空选择</button>
                    <button id="user-batch-delete-btn" class="toolbar-btn danger btn--danger" disabled>批量删除账号</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="select-col">选中</th>
                                <th>用户 ID</th>
                                <th>用户名</th>
                                <th>角色</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="admin-user-list">
                            <tr><td colspan="5">正在加载用户...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div id="admin-user-pagination" class="pagination-controls"></div>
            </div>

            <div class="admin-section" id="comments-management-section">
                <h3>评论管理</h3>
                <p id="admin-comment-message" class="message"></p>
                <div id="comment-filter-bar" class="comment-filter-bar">
                    <label for="comment-filter-mode">查看方式:</label>
                    <select id="comment-filter-mode">
                        <option value="all">全部评论</option>
                        <option value="recipe">按配方ID</option>
                        <option value="user">按用户 (ID或用户名)</option>
                    </select>
                    <input id="comment-filter-value" type="text" placeholder="(无)" disabled>
                    <button id="comment-filter-apply" disabled>应用筛选</button>
                    <button id="comment-filter-reset" disabled>清除筛选</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>配方</th>
                                <th>评论内容</th>
                                <th>时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="admin-comment-list">
                            <tr><td colspan="6">正在加载评论...</td></tr>
                        </tbody>
                    </table>
                    <div id="admin-comment-pagination" class="pagination-controls"></div>
                </div>
            </div>
        </section>

        <div id="user-action-modal" class="modal" hidden>
            <div class="modal-content">
                <span class="close-modal-btn">&times;</span>
                <h4 id="modal-username">管理用户</h4>
                <input type="hidden" id="modal-user-id">
                <div class="user-detail-block">
                    <h5>账号详情（含密码）</h5>
                    <div id="modal-user-details" class="user-detail-content">正在加载账号详情...</div>
                    <p class="security-warning">注意：此区域展示明文密码，仅限管理员排查问题使用。</p>
                </div>

                <div class="form-group">
                    <label for="modal-role-select">修改角色:</label>
                    <select id="modal-role-select">
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                    </select>
                    <button id="modal-save-role-btn" class="modal-button save">保存角色</button>
                </div>

                <hr>

                <div class="form-group">
                    <label>删除用户:</label>
                    <button id="modal-delete-user-btn" class="modal-button delete">删除此用户</button>
                    <p class="irreversible-warning">此操作不可撤销！</p>
                </div>
                <p id="modal-message" class="message" hidden></p>
            </div>
        </div>
        <div id="modal-overlay" class="overlay" hidden></div>

    </main>

    <footer>
        <p>&copy; 2025 Cybar<br>made by 252</p>
    </footer>

    <script src="/js/global.js"></script>
    <script src="admin.js"></script>
</body>
</html>
