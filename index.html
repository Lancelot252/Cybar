<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/styles/theme-tokens.css">
    <link rel="stylesheet" href="/styles/theme-neon.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/layout.css">
    <title>Cybar - 推荐首页</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="page-home page-recommendations">
    <header>
        <h1><a href="/">Cybar</a></h1>
        <div id="user-status">
            <!-- Status will be loaded here by global.js -->
            <a href="/auth/login/">登录</a> | <a href="/auth/register/">注册</a>
        </div>
    </header>

    <main id="home-recommendations-page">
        <section class="home-hero ui-section">
            <h2>今日推荐</h2>
            <p>基于你的偏好、全站热度与随机探索，为你推送值得一试的配方。</p>
            <div class="ui-actions">
                <button id="refresh-home-recommendations" class="btn--primary" type="button">换一批推荐</button>
                <a href="/recipes/" class="btn--ghost">浏览全部配方</a>
            </div>
        </section>

        <section id="home-recommendations-section" class="ui-section">
            <div id="home-recommendations-status" class="state-loading">正在加载推荐...</div>
            <div id="home-recommendations-list" class="home-recommendations-grid" hidden></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Cybar<br>made by 252</p>
    </footer>

    <!-- global.js needs to check login status and show elements like .profile-link if logged in -->
    <script src="/js/global.js"></script>
    <script src="/js/home-recommendations.js"></script>
</body>

</html>
